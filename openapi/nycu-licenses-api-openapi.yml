openapi: 3.0.0
info:
  title: NYCU Dataverse Native & Search Access Licenses API
  description: OpenAPI description served by the National Yang Ming Chiao Tung University (NYCU) Dataverse research-data repository (Dataverse Project v5.10.1) at https://dataverse.lib.nycu.edu.tw. Captured unmodified from the live /openapi endpoint; only the servers and info blocks were adjusted to point at the public base URL.
  version: 5.10.1
servers:
- url: https://dataverse.lib.nycu.edu.tw
  description: NYCU Dataverse production instance.
tags:
- name: Licenses
paths:
  /api/v1/licenses:
    get:
      operationId: getLicenses
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
    post:
      operationId: addLicense
      requestBody:
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/License'
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
  /api/v1/licenses/default:
    get:
      operationId: getDefault
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
  /api/v1/licenses/default/{id}:
    put:
      operationId: setDefault
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: number
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
  /api/v1/licenses/{id}:
    get:
      operationId: getLicenseById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: number
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
    delete:
      operationId: deleteLicenseById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: number
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
  /api/v1/licenses/{id}/:active/{activeState}:
    put:
      operationId: setActiveState
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: number
      - name: activeState
        in: path
        required: true
        schema:
          type: boolean
      responses:
        default:
          content:
            '*/*':
              schema:
                type: object
          description: Default Response.
      tags:
      - Licenses
