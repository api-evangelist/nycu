apis:
  - aid: nycu:oauth
    name: NYCU OAuth / Single Sign-On API
    description: >-
      OAuth 2.0 (RFC 6749) authorization-code service for third-party applications to
      authenticate NYCU users and retrieve consented user data (email/username via the
      profile scope, name via the name scope, and enrollment/employment status via the
      status scope). Apps register a client and redirect-URI whitelist before use.
    humanURL: https://id.nycu.edu.tw/docs/
    baseURL: https://id.nycu.edu.tw
    tags: [ Identity, OAuth, Authentication, SSO ]
    properties:
      - type: Documentation
        url: https://id.nycu.edu.tw/docs/
      - type: SignUp
        url: https://id.nycu.edu.tw/apply/app
      - type: Authentication
        url: https://id.nycu.edu.tw/o/authorize/
  - aid: nycu:dataverse
    name: NYCU Dataverse Repository API
    description: >-
      NYCU Dataverse (Dataverse Project v5.10.1) is the university's research-data
      repository, established 2022. It exposes the standard Dataverse Native API and
      Search API (e.g. /api/info/version, /api/search, dataset and dataverse endpoints)
      for programmatic discovery and access to published datasets.
    humanURL: https://guides.dataverse.org/en/5.10.1/api/
    baseURL: https://dataverse.lib.nycu.edu.tw/api
    tags: [ Research Data, Open Data, Repository, Dataverse ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/5.10.1/api/
  - aid: nycu:oai-pmh
    name: NYCU Dataverse OAI-PMH Endpoint
    description: >-
      OAI-PMH 2.0 metadata-harvesting endpoint ("NYCU Dataverse Dataverse OAI Archive")
      for harvesting dataset metadata from the NYCU Dataverse research-data repository.
    humanURL: https://guides.dataverse.org/en/5.10.1/admin/harvestserver.html
    baseURL: https://dataverse.lib.nycu.edu.tw/oai
    tags: [ OAI-PMH, Metadata, Harvesting, Research Data ]
    properties:
      - type: Documentation
        url: https://guides.dataverse.org/en/5.10.1/admin/harvestserver.html
