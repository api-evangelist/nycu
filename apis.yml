---
aid: nycu
name: National Yang Ming Chiao Tung University
description: >-
  National Yang Ming Chiao Tung University (NYCU) is a public research university in
  Taiwan formed in 2021 from the merger of National Yang-Ming University and National
  Chiao Tung University, and ranked #219 in the QS World University Rankings 2025. Its
  public developer footprint centers on an OAuth 2.0 / single sign-on identity service
  (id.nycu.edu.tw) for third-party application integration, and the NYCU Dataverse
  research-data repository which exposes standard Dataverse REST APIs (Native and Search)
  and an OAI-PMH metadata-harvesting endpoint. Most administrative, course, and portal
  systems are gated behind institutional SSO rather than openly documented.
